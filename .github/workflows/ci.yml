name: CI

on:
  push:
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: Windows MSVC, os: windows-latest, flags: "" }
          - { name: Linux GCC,    os: ubuntu-latest,  flags: "" }
          - { name: Linux Clang,  os: ubuntu-latest,  flags: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ }
          - { name: macOS,        os: macos-latest,   flags: "" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxrandr-dev libxcursor-dev libxi-dev libudev-dev \
            libfreetype-dev libgl1-mesa-dev libegl1-mesa-dev \
            xvfb

      - name: Cache SFML build
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: sfml-${{ matrix.platform.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: sfml-${{ matrix.platform.os }}-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ${{ matrix.platform.flags }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify executable exists
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            test -f build/Release/ArcaneJourney.exe || test -f build/ArcaneJourney.exe
          else
            test -f build/ArcaneJourney
          fi

      # -----------------------------------------------------------------------
      # Package Windows — tag pushes only
      # -----------------------------------------------------------------------
      - name: Package Windows release
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release/ArcaneJourney

          if [ -f build/Release/ArcaneJourney.exe ]; then
            cp build/Release/ArcaneJourney.exe release/ArcaneJourney/
          else
            cp build/ArcaneJourney.exe release/ArcaneJourney/
          fi

          cp -r assets release/ArcaneJourney/

          find build -maxdepth 3 -name "*.dll" | while read dll; do
            cp "$dll" release/ArcaneJourney/ 2>/dev/null || true
          done

          cd release
          7z a "../ArcaneJourney-${{ github.ref_name }}-windows.zip" ArcaneJourney/

      - name: Upload Windows artifact
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ArcaneJourney-${{ github.ref_name }}-windows.zip

      # -----------------------------------------------------------------------
      # Package macOS — tag pushes only
      # -----------------------------------------------------------------------
      - name: Package macOS release
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release/ArcaneJourney.app/Contents/MacOS
          mkdir -p release/ArcaneJourney.app/Contents/Resources

          cp build/ArcaneJourney release/ArcaneJourney.app/Contents/MacOS/

          # Copy assets into the app bundle
          cp -r assets release/ArcaneJourney.app/Contents/Resources/

          # Copy any dylibs SFML placed next to the binary
          find build -maxdepth 3 -name "*.dylib" | while read lib; do
            cp "$lib" release/ArcaneJourney.app/Contents/MacOS/ 2>/dev/null || true
          done

          # Minimal Info.plist so macOS recognises it as an app
          cat > release/ArcaneJourney.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>             <string>ArcaneJourney</string>
            <key>CFBundleExecutable</key>        <string>ArcaneJourney</string>
            <key>CFBundleIdentifier</key>        <string>com.bishal216.arcanejourney</string>
            <key>CFBundleVersion</key>           <string>${{ github.ref_name }}</string>
            <key>CFBundlePackageType</key>       <string>APPL</string>
            <key>NSHighResolutionCapable</key>   <true/>
          </dict>
          </plist>
          PLIST

          # Zip the .app bundle
          cd release
          zip -r "../ArcaneJourney-${{ github.ref_name }}-macos.zip" ArcaneJourney.app/

      - name: Upload macOS artifact
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: ArcaneJourney-${{ github.ref_name }}-macos.zip

  # ---------------------------------------------------------------------------
  # GitHub Release — after all builds pass
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Windows zip
        uses: actions/download-artifact@v4
        with:
          name: windows-release

      - name: Download macOS zip
        uses: actions/download-artifact@v4
        with:
          name: macos-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Arcane Journey ${{ github.ref_name }}"
          body: |
            ## Arcane Journey ${{ github.ref_name }}

            ### How to play
            **Windows:** Download and unzip `ArcaneJourney-${{ github.ref_name }}-windows.zip`, run `ArcaneJourney.exe`
            **macOS:** Download and unzip `ArcaneJourney-${{ github.ref_name }}-macos.zip`, open `ArcaneJourney.app`
            > macOS may show a security warning — right-click the app and choose Open to bypass it

            ### Controls
            | Input | Action |
            |-------|--------|
            | Arrow keys / WASD | Move |
            | Space / W / Up | Jump |
            | Shift | Dash |
            | Up / Down near rope or ladder | Climb |
            | E | Talk to NPC |
            | R | Restart |
          files: |
            ArcaneJourney-${{ github.ref_name }}-windows.zip
            ArcaneJourney-${{ github.ref_name }}-macos.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

  # ---------------------------------------------------------------------------
  # itch.io deploy — only after GitHub Release succeeds
  # ---------------------------------------------------------------------------
  deploy-itch:
    name: Deploy to itch.io
    needs: [build, release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows zip
        uses: actions/download-artifact@v4
        with:
          name: windows-release

      - name: Download macOS zip
        uses: actions/download-artifact@v4
        with:
          name: macos-release

      - name: Install Butler
        run: |
          curl -L -o butler.zip https://github.com/itchio/butler/releases/latest/download/butler-linux-amd64.zip
          unzip butler.zip
          chmod +x linux-amd64/butler
          linux-amd64/butler -V
          echo "$PWD/linux-amd64" >> $GITHUB_PATH

      - name: Push Windows to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler push \
            "ArcaneJourney-${{ github.ref_name }}-windows.zip" \
            bishal216/arcane-journey:windows \
            --userversion "${{ github.ref_name }}"

      - name: Push macOS to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler push \
            "ArcaneJourney-${{ github.ref_name }}-macos.zip" \
            bishal216/arcane-journey:osx \
            --userversion "${{ github.ref_name }}"